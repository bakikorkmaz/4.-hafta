<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baki Korkmaz | Veri Portfolyosu</title>
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #f093fb;
            --bg: #0b0b0d;
            --card-bg: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; text-align: center; }

        /* Profil ve Şatafat */
        .profile-img {
            width: 140px; height: 140px; border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 25px var(--primary);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { 
            font-size: 3rem; letter-spacing: 3px; margin: 10px 0;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Görselleştirme Alanı */
        .viz-section {
            background: var(--card-bg);
            padding: 20px; border-radius: 20px;
            margin: 30px 0; border: 1px solid rgba(255,255,255,0.1);
        }

        .viz-img {
            max-width: 100%; border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* CSV Tablo Alanı */
        .table-container {
            overflow-x: auto; margin-top: 20px;
            background: rgba(0, 0, 0, 0.3); border-radius: 10px;
        }

        table { width: 100%; border-collapse: collapse; color: #ddd; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        th { background: var(--primary); color: #000; }

        /* Butonlar */
        .btn-box { margin: 40px 0; display: flex; justify-content: center; gap: 20px; }
        .btn {
            padding: 15px 35px; border-radius: 30px; border: none;
            font-weight: bold; cursor: pointer; text-decoration: none;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-grafik { background: var(--primary); color: #000; }
        .btn-renk { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); }

    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
    <img src="profil_resmin.jpg" alt="Baki Korkmaz" class="profile-img">
    <h1>BAKİ KORKMAZ</h1>
    <p style="color: #888;">Data Science & Analytics Student</p>

    <div class="viz-section">
        <h3>📊 Haftalık Veri Analizi Görseli</h3>
        <img src="gorsellestirme_veri.png" alt="Görselleştirme Bekleniyor..." class="viz-img">
        <p style="font-size: 0.8rem; margin-top: 10px;">Dosya: gorsellestirme_veri.png</p>
    </div>

    <div class="viz-section">
        <h3>📂 CSV Veri İçeriği (veri.csv.csv)</h3>
        <div class="table-container" id="csv-display">
            <p>Veriler yükleniyor...</p>
        </div>
    </div>

    <div class="btn-box">
        <button class="btn btn-grafik" onclick="alert('Grafik detayları yükleniyor...')">GRAFİK</button>
        <a href="renk.html" class="btn btn-renk">RENK DÜNYASI</a>
    </div>
</div>

<script>
    // 1. FARE TAKİP EFEKTİ (ŞATAFATLI)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('mousemove', (e) => {
        for(let i=0; i<5; i++) particles.push(new Particle(e.x, e.y));
    });

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 6 + 1;
            this.speedX = Math.random() * 3 - 1.5;
            this.speedY = Math.random() * 3 - 1.5;
            this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if(this.size > 0.1) this.size -= 0.1;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.update(); p.draw();
            if(p.size <= 0.1) particles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    // 2. CSV DOSYASINI OKUMA FONKSİYONU
    async function loadCSV() {
        try {
            const response = await fetch('veri.csv.csv'); // Dosya adın tam olarak bu
            const data = await response.text();
            const rows = data.split('\n').slice(0, 10); // İlk 10 satırı göster
            
            let tableHTML = '<table>';
            rows.forEach((row, index) => {
                const columns = row.split(',');
                tableHTML += '<tr>';
                columns.forEach(col => {
                    tableHTML += index === 0 ? `<th>${col}</th>` : `<td>${col}</td>`;
                });
                tableHTML += '</tr>';
            });
            tableHTML += '</table>';
            document.getElementById('csv-display').innerHTML = tableHTML;
        } catch (err) {
            document.getElementById('csv-display').innerHTML = "Veri dosyası (veri.csv.csv) bulunamadı. Lütfen klasöre ekleyin.";
        }
    }
    loadCSV();
</script>

</body>
</html>
