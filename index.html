<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baki Korkmaz | Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00f2fe;
            --secondary-color: #4facfe;
            --bg-color: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Fare Takip Efekti */
        #cursor-blur {
            height: 300px;
            width: 300px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.4) 0%, rgba(0, 242, 254, 0) 70%);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease-out;
        }

        /* Profil Fotoğrafı (Orta Üst) */
        .profile-container {
            margin-top: 50px;
            position: relative;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 25px var(--primary-color);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 3.5rem;
            margin: 20px 0;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        /* Butonlar */
        .nav-container {
            display: flex;
            gap: 25px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            border: 2px solid var(--primary-color);
            border-radius: 50px;
            background: transparent;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--primary-color);
            box-shadow: 0 0 30px var(--primary-color);
            color: black;
        }

        /* Proje Kartı - Görselleştirme */
        .dashboard {
            margin-top: 60px;
            width: 80%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .chart-img {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            margin-top: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.3));
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="cursor-blur"></div>

    <div class="profile-container">
        <img src="image.png" alt="Baki Korkmaz" class="profile-img">
    </div>

    <h1>BAKİ KORKMAZ</h1>
    <p style="letter-spacing: 2px; opacity: 0.8;">DATA SCIENCE & ANALYTICS STUDENT</p>

    <div class="nav-container">
        <a href="3.-hafta/grafikler.png" class="btn">Grafik</a>
        <a href="3.-hafta/data.csv" class="btn">Data</a>
    </div>

    <div class="dashboard">
        <h3>Haftalık Veri Analiz Raporu</h3>
        <img src="kas_radar_grafigi.png" alt="Veri Görselleştirme" class="chart-img">
        <p style="margin-top: 20px; font-style: italic;">JavaScript & CSV Entegrasyonu ile oluşturulmuştur.</p>
    </div>

    <div class="footer">
        © 2026 Baki Korkmaz | Tüm Hakları Saklıdır.
    </div>

    <script>
        // Fare Takip Efekti Scripti
        const blur = document.getElementById("cursor-blur");
        document.addEventListener("mousemove", (e) => {
            blur.style.left = e.clientX + "px";
            blur.style.top = e.clientY + "px";
        });
    </script>
</body>
</html>
