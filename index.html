<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baki Korkmaz | Veri Bilimi Portfolyo</title>
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #f093fb;
            --bg: #0b0b0d;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; text-align: center; position: relative; z-index: 1; }

        .profile-img {
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 30px var(--primary);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { 
            font-size: 3.5rem; margin: 10px 0;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 25px; border-radius: 25px;
            margin: 30px 0; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Görselleştirme Tam Ekran Genişlik */
        .viz-container img {
            width: 100%; max-width: 800px; border-radius: 15px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        /* CSV Tablo Tasarımı */
        .table-scroll {
            overflow-x: auto; margin-top: 15px; border-radius: 10px;
            max-height: 500px;
        }

        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.4); }
        th { background: var(--primary); color: #000; padding: 15px; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        tr:hover { background: rgba(0, 242, 254, 0.1); }

        .status-msg { color: var(--accent); font-style: italic; margin-bottom: 10px; }

        .btn-renk {
            display: inline-block; padding: 15px 40px; border-radius: 50px;
            border: 2px solid var(--accent); color: var(--accent);
            text-decoration: none; font-weight: bold; transition: 0.3s;
            margin-top: 20px;
        }
        .btn-renk:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
    <img src="profil.jpg" alt="Baki Korkmaz" class="profile-img">
    <h1>BAKİ KORKMAZ</h1>
    <p style="color: #888; letter-spacing: 3px;">VERİ ANALİTİĞİ UYGULAMASI</p>

    <div class="section">
        <h2 style="color: var(--primary);">📊 Veri Görselleştirme</h2>
        <div class="viz-container">
            <img src="gorsellestirme_veri.png" alt="Görselleştirme dosyası (gorsellestirme_veri.png) yüklenemedi.">
        </div>
    </div>

    <div class="section">
        <h2 style="color: var(--primary);">📂 Canlı Veri Seti</h2>
        <div id="status" class="status-msg">Veriler okunuyor...</div>
        <div class="table-scroll" id="csv-table">
            </div>
    </div>

    <a href="renk.html" class="btn-renk">RENK DÜNYASI</a>
</div>

<script>
    // --- 1. FARE TAKİP EFEKTİ ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    window.addEventListener('mousemove', (e) => {
        for(let i=0; i<3; i++) particles.push(new Particle(e.x, e.y));
    });

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 5 + 1;
            this.speedX = Math.random() * 2 - 1;
            this.speedY = Math.random() * 2 - 1;
            this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if(this.size > 0.1) this.size -= 0.1;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.update(); p.draw();
            if(p.size <= 0.1) particles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    // --- 2. OTOMATİK CSV YÜKLEME ---
    async function autoLoadCSV() {
        const status = document.getElementById('status');
        try {
            // Dosya adın tam olarak bu olmalı: veri.csv.csv
            const response = await fetch('veri.csv.csv');
            if (!response.ok) throw new Error('Dosya bulunamadı');
            
            const data = await response.text();
            const rows = data.split('\n');
            let tableHTML = '<table><thead><tr>';
            
            // Başlıklar
            const headers = rows[0].split(',');
            headers.forEach(h => tableHTML += `<th>${h}</th>`);
            tableHTML += '</tr></thead><tbody>';

            // Veriler
            for (let i = 1; i < rows.length; i++) {
                if(rows[i].trim() === "") continue;
                const cols = rows[i].split(',');
                tableHTML += '<tr>';
                cols.forEach(c => tableHTML += `<td>${c}</td>`);
                tableHTML += '</tr>';
            }
            
            tableHTML += '</tbody></table>';
            document.getElementById('csv-table').innerHTML = tableHTML;
            status.innerHTML = "✅ Veri akışı sağlandı.";
        } catch (err) {
            status.innerHTML = "❌ Hata: 'veri.csv.csv' dosyasına doğrudan erişilemiyor. Lütfen dosyayı bir sunucuda (Live Server gibi) açın veya 'Dosya Seç' yöntemine geri dönün.";
            console.error(err);
        }
    }

    // Uygulama açılır açılmaz çalıştır
    window.onload = autoLoadCSV;
</script>

</body>
</html>
