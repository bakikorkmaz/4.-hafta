<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Motivasyon Sözü Üretici</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #soz {
            margin-top: 20px;
            font-weight: bold;
            color: darkblue;
        }
    </style>
</head>

<body>
    <h1>Görev 2 - Motivasyon Sözü Üretici</h1>
    <button onclick="rastgeleSoz()">Yeni Söz Üret</button>
    <div id="soz"></div>

    <script>
        const sozler = [
            "Başarı, küçük adımların toplamıdır.",
            "Bugün attığın adım yarını şekillendirir.",
            "Zorluklar seni güçlendirir.",
            "Hayallerini erteleme, şimdi başla!",
            "Veri bilimi geleceğin dili."
        ];

        function rastgeleSoz() {
            const index = Math.floor(Math.random() * sozler.length);
            document.getElementById("soz").innerText = sozler[index];
        }
    </script>
</body>

</html>
